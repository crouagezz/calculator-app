name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web assets
      run: npm run build

    - name: Check Capacitor config
      run: |
        echo "=== Capacitor Config ==="
        cat capacitor.config.ts
        echo ""
        echo "=== Directory Structure ==="
        ls -la
        echo ""
        echo "=== Dist Directory ==="
        ls -la dist/ || echo "dist directory not found"

    - name: Add Android platform (if needed)
      run: |
        if [ ! -d "android" ]; then
          echo "Android directory not found, adding platform..."
          npx cap add android
        else
          echo "Android directory exists"
        fi

    - name: Sync Capacitor
      run: npx cap sync android --verbose
      continue-on-error: true

    - name: Manual sync fallback
      if: failure()
      run: |
        echo "Trying manual copy..."
        mkdir -p android/app/src/main/assets/public
        cp -r dist/* android/app/src/main/assets/public/
        ls -la android/app/src/main/assets/public/

    - name: Fix Java version in capacitor.build.gradle
      run: |
        echo "=== Before fix ==="
        cat android/app/capacitor.build.gradle
        sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/capacitor.build.gradle
        echo ""
        echo "=== After fix ==="
        cat android/app/capacitor.build.gradle

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Verify Android project structure
      run: |
        echo "=== Android Directory ==="
        ls -la android/
        echo ""
        echo "=== App Directory ==="
        ls -la android/app/
        echo ""
        echo "=== Assets Directory ==="
        ls -la android/app/src/main/assets/public/ || echo "public directory not found"

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace --no-daemon
      env:
        JAVA_OPTS: -Xmx4096m
        GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m" -Dorg.gradle.daemon=false

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
